<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>


    <main class="bg-gray-200 h-screen flex items-center justify-center">

       <div class="max-h-100 bg-white border-2 border-gray-400 max-w-100 p-10 flex flex-col justify-center items-center">

            <div>
                <input class="border-solid border-2 border-gray-300 p-1 w-80 overflow-auto whitespace-nowrap" value="" id="input" placeholder="Add a new task.....">
                <button class="bg-green-500 p-1 px-4 text-white mx-2" id="addBtn">Add Task</button>
            </div>

            <div class="my-4 flex justify-center ">
                <button class="text-white bg-blue-600 px-3 py-1 border-2 border-gray-400" id="allBtn">All</button>
                <button class="text-black bg-gray-200 px-3 py-1 border-2 border-gray-400" id="completeBtn">Completed</button>
                <button class="text-black bg-gray-200 px-3 py-1 border-2 border-gray-400" id="pendingBtn">Pending</button>
            </div>
            
            <div id="todos"></div>

            <div class="flex items-center my-1">
                <div class="flex-grow border-2 border-gray-400 w-60"></div>
                <div class="mx-3 text-gray-500">Hows Your mood Today?</div>
                <div class="flex-grow border-2 border-gray-400 w-60"></div>
            </div>

            <div class="flex gap-2 my-2">
                <button class="bg-white text-4xl" id="happy">😊</button>
                <button class="bg-white text-4xl" id="sad">☹️</button>
                <button class="bg-white text-4xl" id="sleepy">😴</button>
                <button class="bg-white text-4xl" id="angry">😡</button>
                <button class="bg-white text-4xl" id="okayok">🙃</button>
            </div>

            <div class="text-purple-800 glitter-purple font-bold bg-green-200 max-w-80 max-h-20 p-4 text-center rounded-md my-3 flex justify-center items-center" id="slogan">Stay positive!! you can do it 💪🏻</div>

       </div>

    </main>

    <script src="m.js"></script>

</body>
</html>
